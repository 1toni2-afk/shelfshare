services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Nu expunem portul 5432 în exterior - doar backend-ul îl accesează, prin rețeaua internă Docker.

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Portul 9000 e expus pe host pentru ca tunelul Cloudflare
    # (storage.shelfshare.ro -> http://localhost:9000) îl accesează direct,
    # din afara rețelei Docker.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "node_modules/.bin/prisma migrate deploy && node dist/main"
    # Portul 3000 e expus pe host pentru ca tunelul Cloudflare
    # (api.shelfshare.ro -> http://localhost:3000) îl accesează direct,
    # din afara rețelei Docker - Nginx Proxy Manager de mai jos nu e folosit
    # de fapt (routarea reală se face prin Cloudflare Tunnel).

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # UI de administrare NPM - accesează http://IP-NUC:81 (schimbă parola default la prima logare!)
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  minio_data:
  npm_data:
  npm_letsencrypt:
