<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>ShelfShare Chat - Test</title>
<script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
  input, textarea, button { width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; }
  button { cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; padding: 10px; }
  button:hover { background: #1d4ed8; }
  #messages { border: 1px solid #ccc; border-radius: 8px; padding: 10px; height: 300px; overflow-y: auto; margin: 10px 0; background: #fafafa; }
  .msg { padding: 6px 10px; margin: 4px 0; border-radius: 8px; background: #e5e7eb; }
  .msg.mine { background: #dbeafe; text-align: right; }
  .status { font-size: 12px; color: #666; }
  label { font-size: 13px; font-weight: 600; margin-top: 8px; display: block; }
</style>
</head>
<body>
  <h2>ShelfShare Chat - pagină de test</h2>

  <label>Access Token</label>
  <input id="token" placeholder="eyJhbGci...">

  <label>Conversation ID</label>
  <input id="conversationId" placeholder="uuid-ul conversației">

  <button onclick="connect()">Conectează + intră în conversație</button>
  <p class="status" id="status">Neconectat</p>

  <div id="messages"></div>

  <label>Mesaj</label>
  <textarea id="messageInput" rows="2" placeholder="Scrie un mesaj..."></textarea>
  <button onclick="sendMessage()">Trimite</button>

  <script>
    let socket = null;
    let myUserId = null;

    function connect() {
      const token = document.getElementById('token').value.trim();
      const conversationId = document.getElementById('conversationId').value.trim();

      if (!token || !conversationId) {
        alert('Completează token și conversationId');
        return;
      }

      try {
        myUserId = JSON.parse(atob(token.split('.')[1])).sub;
      } catch (e) {
        alert('Token invalid');
        return;
      }

      socket = io('http://localhost:3000/chat', {
        auth: { token }
      });

      socket.on('connect', () => {
        document.getElementById('status').textContent = 'Conectat, eu sunt: ' + myUserId;
        socket.emit('join_conversation', conversationId, (res) => {
          console.log('join result', res);
        });
      });

      socket.on('disconnect', () => {
        document.getElementById('status').textContent = 'Deconectat';
      });

      socket.on('new_message', (msg) => {
        addMessage(msg);
      });

      socket.on('message_notification', (data) => {
        console.log('Notificare mesaj nou:', data);
      });

      socket.on('user_typing', (data) => {
        document.getElementById('status').textContent = 'Utilizatorul ' + data.userId + ' scrie...';
        setTimeout(() => {
          document.getElementById('status').textContent = 'Conectat, eu sunt: ' + myUserId;
        }, 2000);
      });

      socket.on('connect_error', (err) => {
        document.getElementById('status').textContent = 'Eroare conectare: ' + err.message;
      });
    }

    function addMessage(msg) {
      const div = document.createElement('div');
      div.className = 'msg' + (msg.senderId === myUserId ? ' mine' : '');
      div.textContent = (msg.content || '[fără text]') + ' — ' + new Date(msg.createdAt).toLocaleTimeString();
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function sendMessage() {
      const conversationId = document.getElementById('conversationId').value.trim();
      const content = document.getElementById('messageInput').value.trim();
      if (!content || !socket) return;

      socket.emit('send_message', { conversationId, content }, (response) => {
        console.log('Mesaj trimis, răspuns server:', response);
      });

      document.getElementById('messageInput').value = '';
    }
  </script>
</body>
</html>
